name: Run WP4 Customer QR UAT

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact 40-character deployed WP4 source SHA
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: customer-qr-uat-wp4-validation
  cancel-in-progress: false

jobs:
  validate-wp4:
    runs-on: ubuntu-latest
    environment: customer-qr-uat
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha }}
          fetch-depth: 1
      - uses: pnpm/action-setup@v4
        with: { version: 11.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Verify isolated UAT source and target
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          CUSTOMER_UAT_FIREBASE_PROJECT_ID: ${{ secrets.CUSTOMER_UAT_FIREBASE_PROJECT_ID }}
        run: |
          test "${#SOURCE_SHA}" -eq 40
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test "$CUSTOMER_UAT_FIREBASE_PROJECT_ID" = "greek-yogert-customer-uat-2026"
          test "$CUSTOMER_UAT_FIREBASE_PROJECT_ID" != "greek-yogert"
      - name: Prepare isolated UAT credentials
        env:
          CUSTOMER_UAT_FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.CUSTOMER_UAT_FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/customer-uat-service-account.json
        run: |
          test -n "$CUSTOMER_UAT_FIREBASE_SERVICE_ACCOUNT_JSON"
          printf '%s' "$CUSTOMER_UAT_FIREBASE_SERVICE_ACCOUNT_JSON" > "$GOOGLE_APPLICATION_CREDENTIALS"
          node -e "JSON.parse(require('fs').readFileSync(process.env.GOOGLE_APPLICATION_CREDENTIALS, 'utf8'))"
      - name: Run WP4 security and operational-control UAT
        env:
          CUSTOMER_UAT_FIREBASE_API_KEY: ${{ secrets.CUSTOMER_UAT_FIREBASE_API_KEY }}
          CUSTOMER_UAT_FIREBASE_PROJECT_ID: ${{ secrets.CUSTOMER_UAT_FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/customer-uat-service-account.json
        run: pnpm uat:wp4
      - name: Install isolated UAT browser
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Customer to Staff browser regression and exact cleanup
        env:
          CUSTOMER_UAT_FIREBASE_API_KEY: ${{ secrets.CUSTOMER_UAT_FIREBASE_API_KEY }}
          CUSTOMER_UAT_FIREBASE_PROJECT_ID: ${{ secrets.CUSTOMER_UAT_FIREBASE_PROJECT_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/customer-uat-service-account.json
        run: pnpm uat:wp4:browser
