name: Deploy Customer QR UAT
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
jobs:
  deploy-customer-uat:
    if: github.head_ref == 'feature/customer-qr-ordering-foundation' || github.ref == 'refs/heads/feature/customer-qr-ordering-foundation'
    runs-on: ubuntu-latest
    environment: customer-qr-uat
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm test && pnpm lint
      - name: Build isolated Customer QR UAT app
        env:
          VITE_CUSTOMER_QR_UAT: "true"
          VITE_FIREBASE_API_KEY: ${{ secrets.CUSTOMER_UAT_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.CUSTOMER_UAT_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.CUSTOMER_UAT_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.CUSTOMER_UAT_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.CUSTOMER_UAT_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.CUSTOMER_UAT_FIREBASE_APP_ID }}
        run: |
          test -n "$VITE_FIREBASE_PROJECT_ID" && test "$VITE_FIREBASE_PROJECT_ID" != "greek-yogert"
          pnpm build
      - name: Deploy isolated UAT Firebase resources
        env:
          CUSTOMER_UAT_FIREBASE_PROJECT_ID: ${{ secrets.CUSTOMER_UAT_FIREBASE_PROJECT_ID }}
          CUSTOMER_UAT_FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.CUSTOMER_UAT_FIREBASE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/customer-uat-service-account.json
        run: |
          test -n "$CUSTOMER_UAT_FIREBASE_PROJECT_ID" && test "$CUSTOMER_UAT_FIREBASE_PROJECT_ID" != "greek-yogert"
          test -n "$CUSTOMER_UAT_FIREBASE_SERVICE_ACCOUNT_JSON"
          printf '%s' "$CUSTOMER_UAT_FIREBASE_SERVICE_ACCOUNT_JSON" > "$GOOGLE_APPLICATION_CREDENTIALS"
          pnpm dlx firebase-tools@latest deploy --config firebase.customer-uat.json --project "$CUSTOMER_UAT_FIREBASE_PROJECT_ID" --only hosting,firestore:rules,firestore:indexes --non-interactive
